name: Deploy Suite

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Rama a desplegar'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/proyectos/psaonlie_suite
            git fetch origin
            git checkout ${{ github.event.inputs.branch }}
            git reset --hard origin/${{ github.event.inputs.branch }}
            
            docker compose down
            docker compose up -d --build
            
            echo "✅ Suite desplegado desde rama: ${{ github.event.inputs.branch }}"
