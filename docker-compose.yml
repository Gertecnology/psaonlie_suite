services:
  pasaje-online-suite:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: pasaje-online-suite
    restart: unless-stopped
    ports:
      - "3000:3002"
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/"]
      interval: 30s
      timeout: 10s
      retries: 3
